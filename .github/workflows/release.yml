name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: "packages/desktop/release/*.exe"
          - os: macos-latest
            platform: mac
            artifact: "packages/desktop/release/*.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Build desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          cd packages/desktop
          npx vite build
          npx electron-builder --${{ matrix.platform }} --publish never
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          draft: false
